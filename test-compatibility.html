<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compatibility Test</title>
</head>
<body>
  <h1>Browser Compatibility Test</h1>
  <div id="results"></div>
  
  <script>
    const results = document.getElementById('results');
    
    function test(name, check) {
      const supported = check();
      const color = supported ? 'green' : 'red';
      const p = document.createElement('p');
      p.style.color = color;
      p.textContent = `${name}: ${supported ? '✓' : '✗'}`;
      results.appendChild(p);
    }
    
    test('ES6 Modules', () => 'noModule' in HTMLScriptElement.prototype);
    test('Import Maps', () => typeof HTMLScriptElement.supports === 'function' && HTMLScriptElement.supports('importmap'));
    test('Dynamic Import', () => {
      try {
        new Function('import("")');
        return true;
      } catch (e) {
        return false;
      }
    });
    test('Web Speech API', () => 'speechSynthesis' in window);
    test('Backdrop Filter', () => {
      const el = document.createElement('div');
      el.style.backdropFilter = 'blur(10px)';
      return el.style.backdropFilter !== '';
    });
    test('CSS inset', () => {
      const el = document.createElement('div');
      el.style.inset = '0';
      return el.style.inset !== '';
    });
    test('WebGL', () => {
      try {
        const canvas = document.createElement('canvas');
        return !!(canvas.getContext('webgl') || canvas.getContext('experimental-webgl'));
      } catch (e) {
        return false;
      }
    });
  </script>
</body>
</html>
